<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta property="og:url" content="https://sungwoon129.github.io/themove-12/pages/202603.html">
<meta property="og:title" content="THE MOVE 2026. 3월호">         
<meta property="og:type" content="website">
<meta property="og:image" content="../thumb/202603.png">
<meta property="og:description" content="세상을 움직여라! 월간 더무브">
    <title>THE MOVE 2026. 3월호</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/openseadragon.min.js"></script>
 <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #111; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        #scroll-container { display: flex; flex-direction: column; align-items: center; gap: 20px; padding: 20px 0; }

.page-wrapper {
    /* 가로는 화면을 꽉 채웁니다. */
    width: 100vw; 
    max-width: 800px;
    /* [핵심] 이미지의 고유 비율을 설정합니다. 
       이 설정 덕분에 가로가 100%일 때 세로 높이가 자동으로 계산되어 박스가 생성됩니다. */
    aspect-ratio: 1024 / 1256; 

    position: relative;
    background: #000;
    margin: 0 auto;
    /* 터치 스크롤 방해 금지 */
    touch-action: pan-y; 
}

.osd-canvas {
    width: 100%;
    height: 100%;
    position: absolute;
    /* 이전의 스크롤 해결책 유지 */
    touch-action: pan-y pinch-zoom;
}

.click-layer {
    display: none;
    /*position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 10;*/
}

        .thumbnail-placeholder {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: contain; background-position: center; background-repeat: no-repeat;
            filter: blur(15px); transition: opacity 0.5s ease; z-index: 2;
        }
        .page-wrapper.loaded .thumbnail-placeholder { opacity: 0; pointer-events: none; }






    </style>
</head>
<body>

<div id="scroll-container"></div>

<script>
    const config = {
        totalPages: 80,
        imageWidth: 1024,
        imageHeight: 1256,
        tileSize: 512,
        basePath: "../images/202603"
    };

    const container = document.getElementById('scroll-container');
    const viewers = {};

for (let i = 1; i <= config.totalPages; i++) {
        const padNum = String(i).padStart(3, '0');
        const wrapper = document.createElement('div');
        wrapper.className = 'page-wrapper';
        wrapper.dataset.pageNum = i;
        wrapper.dataset.padNum = padNum;

        // [이전 답변의 레이어 구조 적용]
        wrapper.innerHTML = `
            <div class="thumbnail-placeholder" style="background-image: url('${config.basePath}/thumbnails/page_${padNum}_thumb.webp')"></div>
            <div id="osd-page-${i}" class="osd-canvas"></div>
            <div class="click-layer"></div>
        `;

        // 3. 이제 container가 null이 아니므로 에러 없이 추가됩니다
        container.appendChild(wrapper);

        // 클릭 이벤트 등록
        wrapper.querySelector('.click-layer').addEventListener('click', () => {
            console.log(`${i}번 페이지 클릭`);
        });
    }

    function initOSD(entry) {
        const wrapper = entry.target;
        const pageNum = wrapper.dataset.pageNum;
        const padNum = wrapper.dataset.padNum;

        if (viewers[pageNum]) return;

        const viewer = OpenSeadragon({
            id: `osd-page-${pageNum}`,
            prefixUrl: "https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/images/",
            tileSources: {
                width: config.imageWidth,
                height: config.imageHeight,
                tileSize: config.tileSize,
                tileOverlap: 0,
                getTileUrl: (level, x, y) => {
                    const columns = Math.ceil(config.imageWidth / config.tileSize);
                    return `${config.basePath}/tiles/page_${padNum}/tile_${(y * columns) + x}.webp`;
                }
            },
            
            // 제스처 설정

        

            mouseNavEnabled: false,            
            showNavigationControl: false,
            gestureSettingsTouch: {
                pinchToZoom: true,      // 핀치 줌 허용
                dblClickToZoom: true,   // 더블클릭 줌 허용
                dragToPan: true         // 드래그 허용 (아래 로직으로 제어)
            },
            panHorizontal: false,
            panVertical: false,
            
            gestureSettingsMouse: {
                dragToPan: false,
                scrollToZoom: false,
                clickToZoom: false,
                dblClickToZoom: false
            },

            defaultZoomLevel: 0,
            minZoomLevel: 0, 
            maxZoomLevel: 4,
            visibilityRatio: 1.0,
            //constrainDuringPan: true,
            homeFillsViewer: true, 

            // 터치 이벤트가 부모 스크롤 컨테이너로 전달되도록 허용
            stopTouchPropagation: false 
        });

        viewers[pageNum] = viewer;



viewer.addHandler('zoom', function() {
    const currentZoom = viewer.viewport.getZoom();
    const homeZoom = viewer.viewport.getHomeZoom();
    const canvas = viewer.canvas;

    // 0.01은 미세한 계산 오차 방어용
    if (currentZoom > homeZoom + 0.01) {
        // [상태 1] 확대됨: 드래그 활성화 + 스크롤 차단
        viewer.panHorizontal = true;
        viewer.panVertical = true;
        
        // 커서 변경 (에러 해결 지점)
        if (canvas) canvas.style.cursor = 'move';
        
        // 브라우저 스크롤 전면 차단
        canvas.style.touchAction = 'none';
    } else {
        // [상태 2] 전체보기: 드래그 비활성화 + 스크롤 허용
        viewer.panHorizontal = false;
        viewer.panVertical = false;
        
        // 커서 복구 (에러 해결 지점)
        if (canvas) canvas.style.cursor = 'default';
        
        // 브라우저 수직 스크롤 통로 개방
        canvas.style.touchAction = 'pan-y pinch-zoom';
    }
});

        // [핵심 로직 2] 커스텀 클릭 기능
        viewer.addHandler('canvas-click', function(event) {
            if (!event.quick) return; // 드래그 중 실수를 방지
            event.preventDefaultAction = true;
            console.log(`${pageNum}번 페이지 클릭`);
        });

        viewer.addHandler('open', () => {
            wrapper.classList.add('loaded');
            // 로딩 즉시 가장 완벽한 비율로 정렬
            viewer.viewport.goHome(true);
            viewer.viewport.minZoomLevel = viewer.viewport.getHomeZoom();
  
            
        });
    }

    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            const pageNum = entry.target.dataset.pageNum;
            if (entry.isIntersecting) {
                initOSD(entry);
            } else {
                if (viewers[pageNum]) {
                    viewers[pageNum].destroy();
                    delete viewers[pageNum];
                    entry.target.querySelector('.osd-canvas').innerHTML = "";
                    entry.target.classList.remove('loaded');
                }
            }
        });
    }, { rootMargin: '200px' });

    document.querySelectorAll('.page-wrapper').forEach(p => observer.observe(p));
</script>
</body>
</html>
